apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: release-x
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      name: frontend
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: booraraman/wanderlust-frontend-beta:e4be468fc6ceb9297e1ef68e6f2b65b9fd931aca
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: release-x
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 5173
      protocol: TCP
      nodePort: 31000
