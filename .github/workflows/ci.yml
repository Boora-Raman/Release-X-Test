name: Release-X CI Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - "kubernetes/**"

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------- Security Scans ----------------

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.0

      - name: Run Trivy Scan
        continue-on-error: true
        run: |
          trivy fs . \
          --severity HIGH,CRITICAL \
          --format table \
          --output trivy-report.txt || true

      - name: OWASP Dependency Check
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: wanderlust
          path: .
          format: HTML
          out: dependency-check-report

      # ---------------- SonarQube ----------------

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.projectKey=wanderlust
            -Dsonar.projectName=wanderlust
            -Dsonar.sources=backend,frontend
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ---------------- Docker Build ----------------

      - name: Docker Login
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build \
          -t booraraman/wanderlust-backend-beta:${{ github.sha }} \
          ./backend

      - name: Build Frontend Image
        run: |
          docker build \
          -t booraraman/wanderlust-frontend-beta:${{ github.sha }} \
          ./frontend

      - name: Push Backend Image
        if: github.event_name != 'pull_request'
        run: |
          docker push booraraman/wanderlust-backend-beta:${{ github.sha }}

      - name: Push Frontend Image
        if: github.event_name != 'pull_request'
        run: |
          docker push booraraman/wanderlust-frontend-beta:${{ github.sha }}

      # ---------------- Upload Reports ----------------

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            trivy-report.txt
            dependency-check-report
