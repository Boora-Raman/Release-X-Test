name: Wanderlust CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      frontend_docker_tag:
        description: "Frontend Docker Image Tag"
        required: false
        default: latest
      backend_docker_tag:
        description: "Backend Docker Image Tag"
        required: false
        default: latest

jobs:

  ci:
    runs-on: ubuntu-latest

    env:
      FRONTEND_TAG: ${{ github.event.inputs.frontend_docker_tag || 'latest' }}
      BACKEND_TAG: ${{ github.event.inputs.backend_docker_tag || 'latest' }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------- Security Scans ----------

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.0

      - name: Trivy Filesystem Scan
        run: |
          trivy fs . --severity HIGH,CRITICAL --format table

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "wanderlust"
          path: "."
          format: "HTML"

      # ---------- Code Quality ----------

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ---------- Environment Setup ----------

      - name: Backend Environment Setup
        run: |
          cd Automations
          bash updatebackendnew.sh

      - name: Frontend Environment Setup
        run: |
          cd Automations
          bash updatefrontendnew.sh

      # ---------- Docker Login ----------

      - name: Docker Login
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------- Build Images ----------

      - name: Build Backend Docker Image
        run: |
          docker build -t madhupdevops/wanderlust-backend-beta:${BACKEND_TAG} ./backend

      - name: Build Frontend Docker Image
        run: |
          docker build -t madhupdevops/wanderlust-frontend-beta:${FRONTEND_TAG} ./frontend

      # ---------- Push Images (only after merge) ----------

      - name: Push Backend Image
        if: github.event_name != 'pull_request'
        run: |
          docker push madhupdevops/wanderlust-backend-beta:${BACKEND_TAG}

      - name: Push Frontend Image
        if: github.event_name != 'pull_request'
        run: |
          docker push madhupdevops/wanderlust-frontend-beta:${FRONTEND_TAG}

      # ---------- Upload reports ----------

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            *.xml
            *.html
